<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="180"> 
    <title>RANKING DE RECOLHA - AILOG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --bg: #050a14; --card: #111827; --accent: #3b82f6; --success: #10b981; --text: #f3f4f6; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; background: var(--card); border-bottom: 3px solid var(--accent); height: 70px; box-sizing: border-box; }
        
        .summary-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px 30px; height: 150px; box-sizing: border-box; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #1f2937; }
        .stat-value { font-size: 3.5rem; font-weight: 800; color: var(--accent); line-height: 1; }
        
        #scroll-container { height: calc(100vh - 220px); overflow-y: hidden; padding: 0 30px 100px 30px; position: relative; }
        
        table { width: 100%; border-collapse: collapse; font-size: 1.5rem; }
        th { padding: 15px; text-align: left; background: #1f2937; color: var(--accent); position: sticky; top: 0; z-index: 10; font-size: 1rem; text-transform: uppercase; }
        td { padding: 18px 15px; border-bottom: 1px solid #1f2937; background: var(--card); }
        
        tr:first-child td { background: #1e293b; border-left: 8px solid #ffd700; }
        
        .bar-container { background: #374151; border-radius: 10px; height: 18px; width: 120px; display: inline-block; margin-right: 12px; vertical-align: middle; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--success); }
        
        .badge-meta { background: #064e3b; color: #6ee7b7; padding: 5px 12px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
        .success-text { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 1.8rem;">RECOLHA DE NOTAS - RANKING</h1>
        <div id="relogio" style="font-size: 1.2rem; color: #9ca3af;"></div>
    </div>

    <div class="summary-container">
        <div class="stat-box">
            <h2 style="margin:0; color:#9ca3af; font-size: 1rem;">TOTAL DE POSTOS</h2>
            <div id="total-geral-postos" class="stat-value">--</div>
        </div>
        <div class="stat-box">
            <h2 style="margin:0; color:#9ca3af; font-size: 1rem;">METAS > 90%</h2>
            <div id="total-meta-90" class="stat-value" style="color: var(--success);">--</div>
        </div>
    </div>

    <div id="scroll-container">
        <table>
            <thead>
                <tr>
                    <th>Analista</th>
                    <th>Postos</th>
                    <th>Status Meta</th>
                    <th>Recolhido</th>
                    <th>Eficiência</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                <tr><td colspan="5" style="text-align:center; padding-top: 50px;">Carregando dados da operação...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // --- CONFIGURAÇÃO THIAGO ---
        // 1. Cole aqui o link que termina em /exec
        const linkAppsScript = 'https://script.google.com/macros/s/AKfycby4CIKmPsbAe1bX8UN6TrAyBs1ieELCoGxyv7Y72ZeJJW1YUUc8Tmr1HbC7KEXTirunsw/exec';
        // ---------------------------

        function carregarDados() {
            if (linkAppsScript.includes('COLE_AQUI')) {
                document.getElementById('corpo-tabela').innerHTML = "Aguardando configuração do link...";
                return;
            }

            // O fetch ajuda a TV a ignorar bloqueios de segurança comuns
            fetch(linkAppsScript)
                .then(response => response.text())
                .then(csvData => {
                    Papa.parse(csvData, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            processarDados(results.data);
                        }
                    });
                })
                .catch(err => {
                    document.getElementById('corpo-tabela').innerHTML = "Erro ao conectar com o Google. Verifique a TV.";
                });
        }

        function processarDados(lista) {
            let analistasObj = {};
            let totalPostos = 0;
            let totalMeta90 = 0;

            const converter = (v) => {
                if (!v) return 0;
                let limpo = v.toString().replace('R$', '').replace(/\./g, '').replace(',', '.').trim();
                return parseFloat(limpo) || 0;
            };

            lista.forEach(row => {
                const keys = Object.keys(row);
                const colUser = keys.find(k => k.trim() === "USUARIO RESPONSAVEL");
                const colRec = keys.find(k => k.trim() === "VALOR RECOLHIDO");
                const colTot = keys.find(k => k.trim() === "VALOR A RECOLHER");

                if (colUser && row[colUser]) {
                    const nome = row[colUser].trim();
                    const vRec = converter(row[colRec]);
                    const vTot = converter(row[colTot]);

                    if (vTot > 0) {
                        totalPostos++;
                        let ef = (vRec / vTot) * 100;
                        let bateu = ef >= 90 ? 1 : 0;
                        if (bateu) totalMeta90++;

                        if (!analistasObj[nome]) {
                            analistasObj[nome] = { nome: nome, postos: 0, meta90: 0, rec: 0, tot: 0 };
                        }
                        analistasObj[nome].postos++;
                        analistasObj[nome].meta90 += bateu;
                        analistasObj[nome].rec += vRec;
                        analistasObj[nome].tot += vTot;
                    }
                }
            });

            let ranking = Object.values(analistasObj).map(a => {
                a.percentual = (a.rec / a.tot) * 100;
                return a;
            }).sort((a, b) => b.percentual - a.percentual);

            renderizar(ranking, totalPostos, totalMeta90);
        }

        function renderizar(dados, tPostos, tMeta) {
            let html = "";
            dados.forEach(a => {
                html += `<tr>
                    <td><b>${a.nome}</b></td>
                    <td>${a.postos}</td>
                    <td><span class="badge-meta">${a.meta90} Postos</span></td>
                    <td class="success-text">R$ ${a.rec.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                    <td>
                        <div class="bar-container"><div class="bar-fill" style="width: ${Math.min(a.percentual, 100)}%"></div></div>
                        <b>${a.percentual.toFixed(2)}%</b>
                    </td>
                </tr>`;
            });
            document.getElementById('corpo-tabela').innerHTML = html;
            document.getElementById('total-geral-postos').innerText = tPostos;
            document.getElementById('total-meta-90').innerText = tMeta;
            document.getElementById('relogio').innerText = new Date().toLocaleString('pt-BR');
            
            iniciarScroll();
        }

        function iniciarScroll() {
            const cont = document.getElementById('scroll-container');
            if (cont.scrollHeight <= cont.offsetHeight) return;
            let pos = 0;
            function loop() {
                pos += 0.7;
                cont.scrollTop = pos;
                if (pos >= (cont.scrollHeight - cont.offsetHeight)) {
                    setTimeout(() => { pos = 0; cont.scrollTop = 0; setTimeout(() => { requestAnimationFrame(loop); }, 2000); }, 5000);
                } else { requestAnimationFrame(loop); }
            }
            requestAnimationFrame(loop);
        }

        carregarDados();
    </script>
</body>
</html>
